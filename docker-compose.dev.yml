version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: sdmps-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sdmps}
      POSTGRES_USER: ${POSTGRES_USER:-sdmps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdmps}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sdmps} -d ${POSTGRES_DB:-sdmps}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sdmps-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
