[project]
name = "sdmps-data"
version = "0.1.0"
description = "Shared database package for SDMPS"
requires-python = ">=3.12"
dependencies = [
  "sqlalchemy>=2.0.36",
  "alembic>=1.14.0"
]

[build-system]
requires = ["setuptools>=69.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["sdmps_data*"]
