[project]
name = "sdmps-integrations"
version = "0.1.0"
description = "Shared integration adapters for SDMPS"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["setuptools>=69.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["sdmps_integrations*"]
